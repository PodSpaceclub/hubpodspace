# ==============================================
# PodSpace Club — Configuração Nginx
# ==============================================
# Adicionar dentro do bloco server{} do seu site em:
# /etc/nginx/sites-available/podspaceclub.com.br

server {
    listen 80;
    listen [::]:80;
    server_name podspaceclub.com.br www.podspaceclub.com.br;

    # Redirecionar HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name podspaceclub.com.br www.podspaceclub.com.br;

    # Certificado SSL (Let's Encrypt via Certbot)
    ssl_certificate /etc/letsencrypt/live/podspaceclub.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/podspaceclub.com.br/privkey.pem;

    # Cabeçalhos de segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Webhook Stripe — necessita do body raw
    location /api/stripe/webhook {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # Proxy reverso para o Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
